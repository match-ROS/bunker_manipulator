# Korrigierte Struktur für manuelles Laden via 'ros2 param load /controller_manager'
/controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    # Controller Definitionen
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      # KEINE 'joints' Liste hier, damit er sie automatisch findet!

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
      # Parameter aus bunker_controllers.yaml
      left_wheel_names: ["wheel1_joint", "wheel3_joint"]
      right_wheel_names: ["wheel2_joint", "wheel4_joint"]
      wheel_separation: 0.7
      wheel_radius: 0.072
      cmd_vel_timeout: 0.5
      open_loop: false
      publish_rate: 50.0
      use_sim_time: true
      odom_frame_id: "odom"
      base_frame_id: "base_link"
      enable_odom_tf: true
