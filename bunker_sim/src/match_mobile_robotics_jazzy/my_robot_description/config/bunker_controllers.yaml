controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

# Joint state broadcaster
joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

# Diff drive controller mapping to wheel joints
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["wheel1_joint", "wheel3_joint"]
    right_wheel_names: ["wheel2_joint", "wheel4_joint"]
    wheel_separation: 0.7
    wheel_radius: 0.072
    cmd_vel_timeout: 0.5
    open_loop: false
    publish_rate: 50
    use_sim_time: true
    odom_topic: "/odom"
    base_frame_id: "base_link"
    enable_odom_tf: true
