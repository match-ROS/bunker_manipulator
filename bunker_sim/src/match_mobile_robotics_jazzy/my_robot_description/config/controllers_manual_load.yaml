# Special file to force-load parameters into /controller_manager node
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["wheel1_joint", "wheel3_joint"]
    right_wheel_names: ["wheel2_joint", "wheel4_joint"]
    wheel_separation: 0.7
    wheel_radius: 0.072
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.03]
    open_loop: true
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    use_stamped_vel: false

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
    publish_rate: 50
    joints: ["wheel1_joint", "wheel2_joint", "wheel3_joint", "wheel4_joint"]
